<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;450;550;650&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        /* ── poster image ── */
        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── right-edge content zone ── */
        .sidebar {
            position: fixed;
            z-index: 3;
            right: max(30px, 6vw);
            top: 50%;
            transform: translateY(-50%);
            width: 170px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 16px;
        }

        /* brand lockup */
        .brand {
            text-align: right;
        }
        .brand .mark {
            display: inline-block;
            font-weight: 650;
            font-size: 12px;
            letter-spacing: 0.02em;
            color: rgba(255,255,255,0.72);
            text-transform: uppercase;
        }

        /* CTA stack */
        .ctas {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            width: 100%;
            padding: 14px 0;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 550;
            letter-spacing: -0.01em;
            transition: 0.18s ease;
            cursor: pointer;
        }

        .cta:active {
            transform: scale(0.96);
        }

        .cta svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* primary */
        .cta-solid {
            background: #fff;
            color: #000;
        }
        .cta-solid:hover { background: #ebebeb; }
        .cta-solid svg { opacity: 0.85; }

        /* ghost */
        .cta-ghost {
            background: transparent;
            color: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.22);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .cta-ghost:hover {
            border-color: rgba(255,255,255,0.42);
            background: rgba(255,255,255,0.04);
        }
        .cta-ghost svg { opacity: 0.6; }

        /* ── bottom footnote ── */
        .footnote {
            position: fixed;
            bottom: max(24px, 4vh);
            left: 0;
            right: 0;
            z-index: 3;
            text-align: center;
            font-size: 9px;
            font-weight: 450;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.26);
        }

        /* ── height tweaks ── */
        @media (min-height: 780px) {
            .sidebar { width: 185px; }
            .cta { padding: 16px 0; font-size: 14px; border-radius: 11px; }
            .ctas { gap: 8px; }
            .cta svg { width: 16px; height: 16px; }
        }

        @media (max-height: 640px) {
            .sidebar { width: 150px; right: 18px; gap: 10px; }
            .cta { padding: 11px 0; font-size: 12px; border-radius: 8px; }
            .ctas { gap: 5px; }
            .cta svg { width: 13px; height: 13px; }
            .brand .mark { font-size: 10px; }
        }

    </style>
</head>
<body>

    <!-- poster -->
    <div class="poster">
        <img src="bg.jpg" alt="">
    </div>

    <!-- content: right edge, stays clear of the face on the left -->
    <div class="sidebar">
        <div class="brand">
            <span class="mark">IDEXOR</span>
        </div>

        <div class="ctas">
            <a href="https://t.me/idexor" class="cta cta-solid">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                    <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
                </svg>
                Telegram
            </a>

            <a href="https://wa.me/85296717301" class="cta cta-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                WhatsApp
            </a>

            <a href="https://fyids.com/?ref=5858" class="cta cta-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                Store
            </a>
        </div>
    </div>

    <p class="footnote">Tap to connect</p>

</body>
</html>
