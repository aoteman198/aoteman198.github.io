<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IDEXOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        /* ── full-bleed background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* anchor top-left — face is there, always visible */
            object-position: left top;
        }

        /* gentle gradient at bottom so buttons are readable */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                transparent 0%,
                transparent 50%,
                rgba(0,0,0,0.20) 70%,
                rgba(0,0,0,0.55) 100%
            );
        }

        /* ── bottom buttons ── */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 28px 20px max(18px, env(safe-area-inset-bottom, 18px));
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .tag {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 8px;
            text-align: center;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 360px;
            padding: 15px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: 0.15s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn:active { transform: scale(0.975); }

        .btn .badge {
            width: 40px; height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn .badge svg { width: 22px; height: 22px; }

        .btn .arrow {
            margin-left: auto;
            opacity: 0.30;
            font-size: 14px;
        }

        /* Telegram */
        .btn-tg {
            background: rgba(42,171,238,0.15);
            border: 1px solid rgba(42,171,238,0.30);
            color: #fff;
        }
        .btn-tg .badge { background: #2AABEE; }
        .btn-tg .badge svg { fill: #fff; }
        .btn-tg:active { background: rgba(42,171,238,0.25); }

        /* WhatsApp */
        .btn-wa {
            background: rgba(37,211,102,0.12);
            border: 1px solid rgba(37,211,102,0.25);
            color: #fff;
        }
        .btn-wa .badge { background: #25D366; }
        .btn-wa .badge svg { fill: #fff; }
        .btn-wa:active { background: rgba(37,211,102,0.22); }

        /* Store */
        .btn-store {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.70);
        }
        .btn-store .badge { background: rgba(255,255,255,0.08); }
        .btn-store .badge svg { fill: none; stroke: rgba(255,255,255,0.50); stroke-width: 1.8; }
        .btn-store:active { background: rgba(255,255,255,0.10); }

        /* tall phones */
        @media (min-height: 800px) {
            .btn { padding: 17px 24px; font-size: 16px; border-radius: 15px; }
            .dock { gap: 11px; }
        }
        /* short phones */
        @media (max-height: 640px) {
            .btn { padding: 12px 18px; font-size: 13px; border-radius: 11px; }
            .dock { gap: 7px; padding-top: 20px; }
            .btn .badge { width: 34px; height: 34px; }
            .btn .badge svg { width: 18px; height: 18px; }
        }

    </style>
</head>
<body>

    <div class="bg"><img src="bg.jpg?v=4" alt=""></div>

    </div>

</body>
