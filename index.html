<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXOR — Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ── Full-bleed poster image ── */
        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* gentle gradient to anchor the CTA zone */
        .poster::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(0,0,0,0.18) 0%,
                    rgba(0,0,0,0.10) 45%,
                    rgba(0,0,0,0.25) 70%,
                    rgba(0,0,0,0.82) 100%
                );
        }

        /* ── Top brand strip ── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 20px 24px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.92);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #0a0a0b;
            letter-spacing: -0.02em;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
        }

        /* ── Bottom CTA zone ── */
        .cta-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 0 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cta-tag {
            text-align: center;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: all 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        /* primary — solid white */
        .btn-primary {
            background: #fff;
            color: #0a0a0b;
        }
        .btn-primary:hover {
            background: #f0f0f0;
            transform: scale(1.015);
        }
        .btn-primary:active {
            transform: scale(0.985);
        }

        /* secondary — ghost outline */
        .btn-ghost {
            background: transparent;
            color: #fff;
            border: 1.5px solid rgba(255,255,255,0.30);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn-ghost:hover {
            border-color: rgba(255,255,255,0.55);
            background: rgba(255,255,255,0.06);
            transform: scale(1.015);
        }
        .btn-ghost:active {
            transform: scale(0.985);
        }

        /* subtle icon treatment */
        .btn svg {
            flex-shrink: 0;
            opacity: 0.75;
        }

        .btn-primary svg { opacity: 0.85; }

        /* ── Responsive height adjustments ── */
        @media (min-height: 800px) {
            .cta-zone { padding-bottom: 40px; gap: 11px; }
            .btn { padding: 17px 20px; font-size: 16px; }
        }

        @media (max-height: 640px) {
            .cta-zone { gap: 7px; padding-bottom: 18px; }
            .btn { padding: 12px 20px; font-size: 14px; border-radius: 12px; }
            .top-bar { padding: 12px 20px 8px; }
            .cta-tag { margin-bottom: 0; }
        }

    </style>
</head>
<body>

    <!-- poster image -->
    <div class="poster">
        <img src="bg.jpg" alt="">
    </div>

    <!-- brand -->
    <div class="top-bar">
        <div class="logo-mark">I</div>
        <span class="logo-text">IDEXOR</span>
    </div>

    <!-- action buttons -->
    <div class="cta-zone">
        <p class="cta-tag">Tap to connect</p>

        <a href="https://t.me/idexor" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
            </svg>
            Telegram
        </a>

        <a href="https://wa.me/85296717301" class="btn btn-ghost">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            WhatsApp
        </a>

        <a href="https://fyids.com/?ref=5858" class="btn btn-ghost">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Visit Store
        </a>
    </div>

</body>
</html>
