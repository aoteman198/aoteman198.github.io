<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IDEXOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .brand {
            position: fixed;
            top: max(20px, env(safe-area-inset-top, 20px));
            left: 24px;
            z-index: 3;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
        }

        /* ── bottom bar ── */
        .bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 40px 20px max(18px, env(safe-area-inset-bottom, 18px));
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.35) 30%, rgba(0,0,0,0.78) 100%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            padding: 15px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: all 0.18s ease;
        }
        .btn:active { transform: scale(0.975); }

        .btn svg { width: 24px; height: 24px; flex-shrink: 0; }

        /* ── primary: Telegram ── */
        .btn-tg {
            background: #2AABEE;
            color: #fff;
            box-shadow: 0 4px 24px rgba(42,171,238,0.30);
        }
        .btn-tg:active { background: #2299D5; }

        /* ── secondary: WhatsApp ── */
        .btn-wa {
            background: rgba(37,211,102,0.12);
            color: #fff;
            border: 1px solid rgba(37,211,102,0.30);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn-wa:active { background: rgba(37,211,102,0.22); border-color: rgba(37,211,102,0.50); }

        /* ── tertiary: Store ── */
        .btn-store {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-store:active { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.25); }

        @media (min-height: 800px) {
            .btn { padding: 17px 24px; font-size: 16px; border-radius: 15px; }
            .bar { gap: 11px; }
        }
        @media (max-height: 640px) {
            .btn { padding: 12px 18px; font-size: 13px; border-radius: 11px; }
            .bar { gap: 7px; padding-top: 24px; }
            .btn svg { width: 20px; height: 20px; }
        }

    </style>
</head>
<body>

    <div class="poster"><img src="bg.jpg" alt=""></div>

    <div class="brand">IDEXOR</div>

    <div class="bar">
        <!-- Telegram -->
        <a href="https://t.me/idexor" class="btn btn-tg">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.563 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.46-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.481-.428-.01-1.252-.242-1.865-.441-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.333-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.14.12.098.153.228.169.32.016.12.036.39.02.533z"/>
            </svg>
            Telegram
        </a>

        <!-- WhatsApp -->
        <a href="https://wa.me/85296717301" class="btn btn-wa">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            WhatsApp
        </a>

        <!-- Store -->
        <a href="https://fyids.com/?ref=5858" class="btn btn-store">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            Visit Store
        </a>
    </div>

</body>
</html>
