<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IDEXOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #0a0a0b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── image section ── */
        .hero {
            flex: 0 0 auto;
            background: #000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .hero img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ── button section ── */
        .actions {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 28px 22px max(24px, env(safe-area-inset-bottom, 24px));
            background: #0a0a0b;
        }

        .brand-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.30);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        /* ── each button ── */
        .btn {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 360px;
            padding: 15px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: 0.15s ease;
        }
        .btn:active { transform: scale(0.975); }

        .btn .icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn .icon svg { width: 22px; height: 22px; }

        .btn .label {
            flex: 1;
        }
        .btn .arrow {
            opacity: 0.25;
            font-size: 14px;
        }

        /* ── Telegram ── */
        .btn-tg {
            background: #141417;
            border: 1px solid #1e1e22;
            color: #fff;
        }
        .btn-tg .icon { background: #2AABEE; }
        .btn-tg .icon svg { fill: #fff; }
        .btn-tg:active { background: #1c1c20; }

        /* ── WhatsApp ── */
        .btn-wa {
            background: #141417;
            border: 1px solid #1e1e22;
            color: #fff;
        }
        .btn-wa .icon { background: #25D366; }
        .btn-wa .icon svg { fill: #fff; }
        .btn-wa:active { background: #1c1c20; }

        /* ── Store ── */
        .btn-store {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.55);
        }
        .btn-store .icon { background: rgba(255,255,255,0.06); }
        .btn-store .icon svg { fill: none; stroke: rgba(255,255,255,0.45); stroke-width: 1.8; }
        .btn-store:active { background: rgba(255,255,255,0.03); }

        @media (min-height: 800px) {
            .actions { gap: 13px; padding-top: 36px; }
            .btn { padding: 17px 24px; font-size: 16px; border-radius: 15px; }
        }
        @media (max-height: 680px) {
            .actions { gap: 8px; padding-top: 16px; }
            .btn { padding: 12px 18px; font-size: 13px; border-radius: 11px; }
            .btn .icon { width: 36px; height: 36px; }
            .btn .icon svg { width: 18px; height: 18px; }
        }

    </style>
</head>
<body>

    <!-- full-width image, no cropping -->
    <div class="hero">
        <img src="bg.jpg?v=3" alt="">
    </div>

    <!-- buttons -->
    <div class="actions">
        <div class="brand-tag">IDEXOR</div>

        <a href="https://fyids.com/?ref=5858" class="btn btn-store">
            <span class="icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </span>
            <span class="label">Visit Store</span>
            <span class="arrow">&#8594;</span>
        </a>
    </div>

</body>
</html>
