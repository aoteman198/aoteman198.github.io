<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IDEXOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 30% center;
        }

        .brand {
            position: fixed;
            top: max(18px, env(safe-area-inset-top, 18px));
            left: 22px;
            z-index: 3;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.10em;
            color: rgba(255,255,255,0.50);
            text-transform: uppercase;
        }

        /* ── bottom bar ── */
        .bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 28px 20px max(14px, env(safe-area-inset-bottom, 14px));
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.45) 35%, rgba(0,0,0,0.82) 100%);
            display: flex;
            flex-direction: column;
            gap: 9px;
            align-items: center;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: all 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .btn:active { transform: scale(0.97); }

        .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* primary — solid white, strong */
        .btn-main {
            background: #fff;
            color: #000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.30);
        }
        .btn-main svg { opacity: 0.80; }
        .btn-main:active { background: #e8e8e8; }

        /* secondary — frosted glass */
        .btn-sub {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-sub svg { opacity: 0.55; }
        .btn-sub:active {
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.28);
        }

        /* ── sizing by screen ── */
        @media (min-height: 800px) {
            .btn { padding: 17px 22px; font-size: 16px; border-radius: 13px; }
            .bar { gap: 10px; padding-bottom: max(22px, env(safe-area-inset-bottom, 22px)); }
            .btn svg { width: 22px; height: 22px; }
        }
        @media (max-height: 640px) {
            .btn { padding: 12px 18px; font-size: 14px; border-radius: 10px; }
            .bar { gap: 7px; padding: 20px 14px max(10px, env(safe-area-inset-bottom, 10px)); }
            .btn svg { width: 17px; height: 17px; }
        }

    </style>
</head>
<body>

    <div class="poster"><img src="bg.jpg" alt=""></div>

    <div class="brand">IDEXOR</div>

    <div class="bar">
        <a href="https://t.me/idexor" class="btn btn-main">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
            </svg>
            Telegram
        </a>

        <a href="https://wa.me/85296717301" class="btn btn-sub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            WhatsApp
        </a>

        <a href="https://fyids.com/?ref=5858" class="btn btn-sub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Store
        </a>
    </div>

</body>
</html>
