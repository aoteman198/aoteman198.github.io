<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IDEXOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        /* ── full-bleed poster ── */
        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        /* no overlay — image speaks for itself */

        /* ── bottom action bar ── */
        .actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 32px 16px calc(12px + env(safe-area-inset-bottom, 12px));
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            gap: 9px;
            align-items: center;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 360px;
            padding: 16px 24px;
            border-radius: 13px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: 0.16s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: scale(0.97); }

        .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* primary CTA */
        .btn-primary {
            background: #fff;
            color: #000;
        }
        .btn-primary:active { background: #e6e6e6; }

        /* secondary */
        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.20);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn-ghost:active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }

        /* ── top brand ── */
        .brand {
            position: fixed;
            top: calc(16px + env(safe-area-inset-top, 16px));
            left: 20px;
            z-index: 3;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        /* ── taller phones: bigger buttons ── */
        @media (min-height: 800px) {
            .btn { padding: 18px 24px; font-size: 16px; border-radius: 14px; }
            .actions { gap: 10px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 20px)); }
        }

        /* ── very short screens ── */
        @media (max-height: 600px) {
            .btn { padding: 12px 20px; font-size: 14px; border-radius: 11px; }
            .actions { gap: 7px; padding: 24px 12px calc(8px + env(safe-area-inset-bottom, 8px)); }
        }

    </style>
</head>
<body>

    <div class="poster">
        <img src="bg.jpg" alt="">
    </div>

    <div class="brand">IDEXOR</div>

    <div class="actions">
        <a href="https://t.me/idexor" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
            </svg>
            Telegram
        </a>

        <a href="https://wa.me/85296717301" class="btn btn-ghost">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            WhatsApp
        </a>

        <a href="https://fyids.com/?ref=5858" class="btn btn-ghost">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Store
        </a>
    </div>

</body>
</html>
